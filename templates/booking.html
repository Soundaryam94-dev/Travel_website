{% extends "base.html" %}

{% block content %}
<main class="container" style="margin-top: 60px;">
    <div style="max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 40px; box-shadow: var(--card-shadow); border: 1px solid #f1f5f9;">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Reserve Your Trip</h1>
        <p style="color: #64748b; margin-bottom: 30px;">Destination: <span style="font-weight: 700; color: var(--text);">{{ destination.title }}</span></p>
        
        <form method="POST" id="bookingForm">
            <div class="form-group">
                <label for="check_in">Check-in Date</label>
                <input type="date" id="check_in" name="check_in" required>
            </div>
            
            <div class="form-group">
                <label for="check_out">Check-out Date</label>
                <input type="date" id="check_out" name="check_out" required>
            </div>
            
            <div class="form-group">
                <label for="travelers">Number of Travelers</label>
                <input type="number" id="travelers" name="travelers" min="1" value="1" required onchange="calculateTotal()">
            </div>
            
            <div style="background: #f8fafc; padding: 20px; border-radius: 20px; margin-bottom: 30px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 600;">
                    <span>Price per person</span>
                    <span>${{ destination.price }}</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 1.5rem; font-weight: 800; color: var(--secondary);">
                    <span>Total Price</span>
                    <span id="totalDisplay">${{ destination.price }}</span>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1.1rem;">Confirm Booking</button>
        </form>
    </div>
</main>

<script>
    const tourPrice = parseFloat("{{ destination.price or 0 }}");
    function calculateTotal() {
        const travelers = document.getElementById('travelers').value;
        const total = tourPrice * travelers;
        document.getElementById('totalDisplay').textContent = '$' + total.toFixed(2);
    }
</script>
{% endblock %}
