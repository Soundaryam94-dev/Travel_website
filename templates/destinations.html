{% extends "base.html" %}

{% block content %}
<main class="container" style="margin-top: 60px;">
    <div style="text-align: center; margin-bottom: 50px;">
        <h1 style="font-size: 3rem;">All Destinations</h1>
        <p style="color: #64748b; font-size: 1.1rem; max-width: 600px; margin: 20px auto;">Choose your next journey from our top-rated locations.</p>
    </div>

    <div class="grid">
        {% for dest in destinations %}
        <div class="card">
            <img src="{{ dest.image_url }}" alt="{{ dest.title }}">
            <div class="card-body">
                <div class="card-location"><i class="fas fa-location-dot"></i> {{ dest.location }}</div>
                <h3 class="card-title">{{ dest.title }}</h3>
                <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 20px; height: 3.6em; overflow: hidden;">{{ dest.description }}</p>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="card-price">${{ dest.price }}</span>
                    <a href="{{ url_for('destination_detail', id=dest.id) }}" class="btn btn-primary">View Details</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</main>
{% endblock %}
