{% extends "base.html" %}

{% block content %}
<main class="container" style="margin-top: 100px;">
    <div class="form-container">
        <h1 style="text-align: center; margin-bottom: 30px; font-size: 2.5rem;">Welcome Back</h1>
        <form method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Sign In</button>
        </form>
        <p style="text-align: center; margin-top: 30px; color: #64748b;">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--secondary); font-weight: 600; text-decoration: none;">Register here</a>
        </p>
    </div>
</main>
{% endblock %}
